repo_id: 19
suppression: false

# Material types, auto_generate = true if you need the values to switch based on the 'MAT' field
auto_generate_mat: true
material_types:
  audiovisual_materials: false
  books: false
  electronic_documents: false
  games: false
  jsonmodel_type: material_types
  manuscripts: false
  maps: false
  microforms: false
  photographs: false
  realia: false
  serials: false
  works_of_art: false

# Adds notes into one field based on whether these fields contain data if auto_generate is set to true
auto_generate_note: true
note_fields:
  - source: PCN
    label: "Previous Call Number"
  - source: MEM
    label: "Memoranda"
  - source: OPR
    label: "Operator's Initials"
  - source: pri_note
    label: "Price"
  - source: dupe_acc
    label: "Duplicate Accession ID"
# Migration Note is added at the end of the list of notes every time.
migration_note:
  content: "Loaded to ArchivesSpace database in 2025 from CATACQ DBText database."

#Adds References if their source field has data and auto_generate is true
auto_generate_references: true
references_template:
  - source: AUT_URI
    ref: "{AUT_URI}"
    role: creator
    relator: aut
  - source: OWNER_URI
    ref: "{OWNER_URI}"
    role: source
    relator: dpt
  - source: DON_URI
    ref: "{DON_URI}"
    role: source
    relator: dnr
  - source: VNA_URI
    ref: "{VNA_URI}"
    role: source
    relator: bsl
  - source: PUB_URI
    ref: "{PUB_URI}"
    role: source
    relator: pbl

# Adds External Document if their source field has data and auto_Generate is true
auto_generate_external_documents: true
external_doc_template:
  - source: URL
    jsonmodel_type: external_document
    location: "{URL}"
    title: "URL"
    publish: false
  
# Adds listed extents if their source field has data if auto_generate is true
auto_generate_extents: true
extents_template:
  - source: MIT
    jsonmodel_type: extent
    extent_type: manuscript_items_(accessions)
    lock_version: 0
    number: "{MIT}"
    portion: part
  - source: MTL
    jsonmodel_type: extent
    extent_type: monograph_titles_(accessions)
    lock_version: 0
    number: "{MTL}"
    portion: part
  - source: MVL
    jsonmodel_type: extent
    extent_type: monograph_volumes_(accessions)
    lock_version: 0
    number: "{MVL}"
    portion: part
  - source: NBF
    jsonmodel_type: extent
    extent_type: non-book_formats_(accessions)
    lock_version: 0
    number: "{NBF}"
    portion: part
  - source: MLF
    jsonmodel_type: extent
    extent_type: linear_feet
    portion: part
    lock_version: 0
    number: "{MLF}"
  - source: COL
    jsonmodel_type: extent
    extent_type: see_container_summary
    lock_version: 0
    number: "0"
    portion: part
    container_summary: "{COL}"
  - source: EPH
    jsonmodel_type: extent
    extent_type: ephemera_items_(accessions)
    lock_version: 0
    number: "{EPH}"
    portion: part 
  - source: STL
    jsonmodel_type: extent
    lock_version: 0
    extent_type: serial_titles_(accessions)
    portion: part
    number: "{STL}"
  - source: SLV
    jsonmodel_type: extent
    lock_version: 0
    extent_type: serial_volumes_(accessions)
    portion: part
    number: "{SVL}"

#Add dates if their source field has data and auto_generate is true
auto_generate_dates: true
dates_template:
    - source: PDT
      expression: "{PDT}"
      label: publication
      date_type: inclusive

#Add instances if their source field has data and auto_generate is true
auto_generate_instances: true
instances_template:
  - source: TC_URI
    instance_type: mixed_materials
    jsonmodel_type: instance
    sub_container: 
      jsonmodel_type: sub_container
      top_container: 
        ref: "{TC_URI}"

#Add Payment summary if their source field has data and auto_generate is true
auto_generate_payment: true
payment_template:
  - source: PRI
    currency: "{currency}"
    in_lot: {in_lot}
    jsonmodel_type: 'payment_summary'
    payments:
        - fund_code: "{FUN}"
          note: "{PAY_NOTE}"
    total_price: "{total_price}"


# Final accession template
template:
  jsonmodel_type: accession
  publish: false
  suppressed: true
  restrictions_apply: false
  access_restrictions: false
  access_restrictions_note: Open without restriction
  user_restrictions: false
  repository:
    ref: "/repositories/{repo_id}"
  id_0: "{adt_id_0}"
  id_1: "{DEP}"
  id_2: "{acc_id_2}"
  id_3: "{acc_id_3}"
  acquisition_type: "{acquisition_type}"
  accession_date: "{acc_date}"
  user_defined:
    jsonmodel_type: user_defined
    boolean_1: true
    boolean_2: true
    text_1: "{BCN}"
    text_3: "{SER}"
    text_4: "{PLATE}"
    text_5: "{BIB}"
    string_1: "{ACC}"
    string_3: "{PLA}"
    enum_1: "{ORT}"
    repository:
      ref: "/repositories/{repo_id}"
  linked_agents: "{linked_agents}"
  extents: "{extents_template}"
  create_time: "{DTE}"
  payment_summary: "{payment_summary}"
  content_description: "{LNO}"
  material_types: "{material_types}"
  general_note: "{note_field}"
  dates: "{dates}"
  title: "{TTL}"
  display_string: "{TTL}"
  instances: "{instances}"
  external_documents: "{external_documents}"
  access_restrictions: false
  access_restrictions_note: ""
  